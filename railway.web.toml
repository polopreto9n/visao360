[build]
builder = "NIXPACKS"
buildCommand = "cd apps/web && npx next build"

[deploy]
startCommand = "cd apps/web && npx next start -p $PORT"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environments]
  [environments.production]
    [environments.production.variables]
    NODE_ENV = "production"
    PORT = "3000"
    NEXT_PUBLIC_API_URL = "https://visao360-api-production.up.railway.app/api/v1"
