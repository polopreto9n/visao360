[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
buildArgs = { NEXT_PUBLIC_API_URL = "https://visao360-api-production.up.railway.app/api/v1" }

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environments]
  [environments.production]
    [environments.production.variables]
    NODE_ENV = "production"
    PORT = "3000"
    NEXT_PUBLIC_API_URL = "https://visao360-api-production.up.railway.app/api/v1"
