# railway.toml — configuracao do servico visao360-web (servico linkado)
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
buildArgs = { NEXT_PUBLIC_API_URL = "https://visao360-api-production.up.railway.app/api/v1" }

[deploy]
startCommand = "sh -c 'HOSTNAME=0.0.0.0 node apps/web/server.js'"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments]
  [environments.production]
    [environments.production.variables]
    NODE_ENV = "production"
    PORT = "3000"
    HOSTNAME = "0.0.0.0"
    NEXT_TELEMETRY_DISABLED = "1"
