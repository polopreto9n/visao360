[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildCommand = ""

[deploy]
startCommand = "node_modules/.bin/prisma migrate deploy --schema=prisma/schema.prisma && node dist/main"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environments]
  [environments.production]
    [environments.production.variables]
    NODE_ENV = "production"
    PORT = "3001"
    LOG_LEVEL = "warn"
